<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bitácora">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#007AFF">
<title>Bitácora Médica</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --blue:#007AFF;--red:#FF3B30;--green:#34C759;--orange:#FF9500;
  --gray:#8E8E93;--bg:#F2F2F7;--card:#FFFFFF;--text:#1C1C1E;
  --text2:#8E8E93;--sep:rgba(60,60,67,.29);
  --nav:44px;--st:env(safe-area-inset-top,20px);--sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);user-select:none;-webkit-user-select:none}

/* NAV BAR */
.navbar{position:fixed;top:0;left:0;right:0;height:calc(var(--nav) + var(--st));padding-top:var(--st);background:rgba(242,242,247,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:.5px solid var(--sep);z-index:100;display:flex;align-items:flex-end;padding-bottom:0}
.nbc{display:flex;align-items:center;width:100%;min-height:44px;padding:0 4px}
.nb-title{flex:1;text-align:center;font-size:17px;font-weight:600}
.nb-btn{min-width:44px;min-height:44px;display:flex;align-items:center;gap:3px;color:var(--blue);background:none;border:none;font-size:17px;padding:0 8px;cursor:pointer;touch-action:manipulation;font-family:inherit}
.nb-btn svg{flex-shrink:0}

/* SCREENS */
#app{position:fixed;inset:0;overflow:hidden}
.screen{position:absolute;inset:0;background:var(--bg);transform:translateX(100%);transition:transform .35s cubic-bezier(.25,.46,.45,.94);overflow:hidden;display:flex;flex-direction:column;will-change:transform}
.screen.active{transform:translateX(0)}
.screen.prev{transform:translateX(-100%)}
.sbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-top:calc(var(--nav) + var(--st));padding-bottom:calc(var(--sb) + 24px)}

/* SEARCH */
.searchbar{display:flex;align-items:center;background:rgba(118,118,128,.12);border-radius:10px;padding:7px 10px;gap:6px;margin:8px 16px}
.searchbar input{flex:1;background:none;border:none;outline:none;font-size:17px;color:var(--text);font-family:inherit}
.searchbar input::placeholder{color:var(--text2)}

/* LISTS */
.sec-hdr{font-size:13px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;padding:0 16px 6px;margin-top:24px}
.card{background:var(--card);border-radius:12px;margin:0 16px;overflow:hidden}
.row{display:flex;align-items:center;padding:12px 16px;min-height:44px;position:relative;cursor:pointer;touch-action:manipulation}
.row:not(:last-child)::after{content:'';position:absolute;bottom:0;left:16px;right:0;height:.5px;background:var(--sep)}
.row:active{background:rgba(0,0,0,.05)}
.row-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;margin-right:12px;flex-shrink:0}
.row-main{flex:1;min-width:0}
.row-title{font-size:17px;color:var(--text)}
.row-sub{font-size:13px;color:var(--text2);margin-top:2px}
.row-val{font-size:17px;color:var(--text2);flex-shrink:0}
.arrow::after{content:'›';color:var(--text2);font-size:22px;margin-left:6px;flex-shrink:0}
.badge{background:var(--blue);color:#fff;font-size:12px;font-weight:600;border-radius:10px;padding:2px 7px;margin-left:8px;flex-shrink:0}

/* FORMS */
.form-sec{margin-top:24px}
.form-hdr{font-size:13px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;padding:0 16px 6px}
.frow{display:flex;align-items:center;padding:0 16px;min-height:44px;position:relative}
.frow:not(:last-child)::after{content:'';position:absolute;bottom:0;left:16px;right:0;height:.5px;background:var(--sep)}
.flabel{font-size:17px;color:var(--text);min-width:110px;flex-shrink:0}
.finput{flex:1;background:none;border:none;outline:none;font-size:17px;color:var(--text);text-align:right;padding:12px 0;font-family:inherit}
.finput::placeholder{color:var(--text2)}
.finput.left{text-align:left}
select.finput{-webkit-appearance:none;cursor:pointer}
textarea.finput{text-align:left;padding:12px 0;min-height:88px;resize:none;line-height:1.4}

/* TAGS */
.tags{display:flex;flex-wrap:wrap;gap:8px;padding:10px 16px 12px}
.tag{background:rgba(0,122,255,.12);color:var(--blue);border-radius:14px;padding:4px 10px;font-size:14px;display:flex;align-items:center;gap:5px}
.tag-x{background:none;border:none;color:var(--blue);font-size:18px;line-height:1;cursor:pointer;padding:0;touch-action:manipulation}
.tag-add{display:flex;align-items:center;padding:6px 16px 10px;gap:8px}
.tag-input{flex:1;background:rgba(118,118,128,.12);border:none;outline:none;border-radius:8px;padding:7px 10px;font-size:15px;color:var(--text);font-family:inherit}

/* MEDS */
.med-row{display:flex;align-items:center;padding:10px 16px;position:relative}
.med-row:not(:last-child)::after{content:'';position:absolute;bottom:0;left:16px;right:0;height:.5px;background:var(--sep)}
.med-info{flex:1}
.med-name{font-size:16px;font-weight:500}
.med-detail{font-size:13px;color:var(--text2);margin-top:1px}
.med-del{color:var(--red);background:none;border:none;font-size:24px;line-height:1;padding:0 0 0 12px;cursor:pointer;touch-action:manipulation}
.add-row{display:flex;align-items:center;padding:10px 16px;cursor:pointer;touch-action:manipulation}
.add-row:active{background:rgba(0,0,0,.05)}
.add-plus{color:var(--blue);font-size:26px;font-weight:300;margin-right:10px;line-height:1}
.add-label{color:var(--blue);font-size:17px}

/* BUTTONS */
.btn{display:block;width:calc(100% - 32px);margin:0 16px;padding:14px;border-radius:12px;border:none;font-size:17px;font-weight:600;cursor:pointer;text-align:center;touch-action:manipulation;font-family:inherit}
.btn:active{opacity:.75}
.btn-primary{background:var(--blue);color:#fff}
.btn-danger{background:rgba(255,59,48,.1);color:var(--red);margin-top:12px}
.btn-secondary{background:rgba(0,122,255,.1);color:var(--blue)}

/* FAB */
.fab{position:fixed;right:20px;bottom:calc(20px + var(--sb));width:56px;height:56px;border-radius:28px;background:var(--blue);color:#fff;font-size:30px;border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,122,255,.45);cursor:pointer;z-index:50;touch-action:manipulation;font-weight:300}

/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-top:16px}
.stat-card{background:var(--card);border-radius:12px;padding:12px}
.stat-lbl{font-size:12px;color:var(--text2);margin-bottom:3px}
.stat-val{font-size:22px;font-weight:700}
.stat-unit{font-size:13px;font-weight:400;color:var(--text2)}

/* PATIENT HEADER */
.pt-head{background:var(--card);border-radius:14px;margin:16px 16px 0;padding:16px}
.pt-avatar{width:58px;height:58px;border-radius:29px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;margin-bottom:10px}
.pt-name{font-size:22px;font-weight:700}
.pt-meta{font-size:15px;color:var(--text2);margin-top:3px}

/* VISIT ITEMS */
.visit-row{display:flex;padding:12px 16px;gap:12px;position:relative;cursor:pointer;touch-action:manipulation}
.visit-row:not(:last-child)::after{content:'';position:absolute;bottom:0;left:16px;right:0;height:.5px;background:var(--sep)}
.visit-row:active{background:rgba(0,0,0,.04)}
.vdate{width:46px;text-align:center;flex-shrink:0}
.vday{font-size:22px;font-weight:700;color:var(--blue);line-height:1}
.vmon{font-size:11px;color:var(--text2);text-transform:uppercase;margin-top:1px}
.vcontent{flex:1;min-width:0}
.vtitle{font-size:15px;font-weight:500}
.vchips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.chip{background:rgba(118,118,128,.12);border-radius:6px;padding:2px 7px;font-size:12px}
.vnotes{font-size:13px;color:var(--text2);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* BMI colors */
.bmi-n{color:var(--green)}.bmi-s{color:var(--orange)}.bmi-o{color:var(--red)}.bmi-u{color:var(--blue)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.show{opacity:1;pointer-events:all}
.alert{background:rgba(242,242,247,.98);backdrop-filter:blur(40px);border-radius:14px;width:100%;max-width:310px;overflow:hidden;transform:scale(.9);transition:transform .2s}
.modal-bg.show .alert{transform:scale(1)}
.alert-body{padding:20px 16px 12px;text-align:center}
.alert-t{font-size:17px;font-weight:600;margin-bottom:4px}
.alert-m{font-size:13px;color:var(--text2)}
.alert-acts{border-top:.5px solid var(--sep);display:flex}
.alert-btn{flex:1;padding:14px;background:none;border:none;font-size:17px;cursor:pointer;color:var(--blue);touch-action:manipulation;font-family:inherit}
.alert-btn:not(:last-child){border-right:.5px solid var(--sep)}
.alert-btn.dest{color:var(--red)}.alert-btn.bold{font-weight:600}

/* ACTION SHEET */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
.sheet-bg.show{opacity:1;pointer-events:all}
.asheet{position:fixed;bottom:0;left:0;right:0;padding:8px 8px calc(8px + var(--sb));z-index:201;transform:translateY(100%);transition:transform .3s cubic-bezier(.25,.46,.45,.94)}
.asheet.show{transform:translateY(0)}
.asheet-grp{background:rgba(242,242,247,.98);backdrop-filter:blur(40px);border-radius:14px;overflow:hidden;margin-bottom:8px}
.asheet-btn{display:block;width:100%;padding:16px;background:none;border:none;font-size:17px;text-align:center;cursor:pointer;color:var(--blue);position:relative;touch-action:manipulation;font-family:inherit}
.asheet-btn:not(:last-child)::after{content:'';position:absolute;bottom:0;left:0;right:0;height:.5px;background:var(--sep)}
.asheet-btn.dest{color:var(--red)}.asheet-btn.cancel{font-weight:600}

/* MED BOTTOM SHEET */
.bsheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:16px 16px 0 0;padding:20px 16px calc(20px + var(--sb));z-index:202;transform:translateY(100%);transition:transform .3s cubic-bezier(.25,.46,.45,.94);box-shadow:0 -2px 20px rgba(0,0,0,.12)}
.bsheet.show{transform:translateY(0)}
.bsheet-title{font-size:17px;font-weight:600;text-align:center;margin-bottom:16px}
.bfield{margin-bottom:12px}
.bfield label{font-size:13px;color:var(--text2);display:block;margin-bottom:4px}
.bfield input{width:100%;background:rgba(118,118,128,.12);border:none;outline:none;border-radius:8px;padding:10px 12px;font-size:16px;color:var(--text);font-family:inherit}
.brow{display:flex;gap:10px}
.brow .bfield{flex:1}

/* EMPTY STATE */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 32px;text-align:center}
.empty-ico{font-size:56px;margin-bottom:14px;opacity:.4}
.empty-t{font-size:20px;font-weight:600;margin-bottom:6px}
.empty-s{font-size:15px;color:var(--text2)}

/* CHARTS */
.chart-wrap{padding:10px 10px 6px}
.chart-legend{display:flex;gap:14px;padding:0 4px 6px;font-size:11px;color:var(--text2)}
.chart-legend span{display:flex;align-items:center;gap:4px}

.hidden{display:none!important}
.mt8{margin-top:8px}
.mt16{margin-top:16px}
.mb16{margin-bottom:16px}

/* GPS BUTTON */
.gps-btn{display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--blue);font-size:16px;font-family:inherit;cursor:pointer;touch-action:manipulation;padding:12px 16px;width:100%}
.gps-btn:active{opacity:.7}
.gps-dot{width:10px;height:10px;border-radius:5px;background:var(--text2);flex-shrink:0}
.gps-dot.ok{background:var(--green)}
.gps-dot.err{background:var(--red)}
.gps-dot.loading{background:var(--orange);animation:pulse .8s infinite alternate}
@keyframes pulse{to{opacity:.3}}
</style>
</head>
<body>
<div id="app">

<!-- ===== SCREEN: PATIENTS LIST ===== -->
<div id="s-patients" class="screen active">
  <div class="navbar">
    <div class="nbc">
      <div style="min-width:44px"></div>
      <div class="nb-title">Bitácora Médica</div>
      <button class="nb-btn" onclick="A.globalMenu()" title="Menú">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="5" r="1.2" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none"/><circle cx="12" cy="19" r="1.2" fill="currentColor" stroke="none"/></svg>
      </button>
    </div>
  </div>
  <div class="sbody" id="list-body"></div>
  <button class="fab" onclick="A.openPatientForm(null)">+</button>
</div>

<!-- ===== SCREEN: PATIENT FORM ===== -->
<div id="s-pform" class="screen">
  <div class="navbar">
    <div class="nbc">
      <button class="nb-btn" onclick="A.back()">
        <svg width="9" height="15" viewBox="0 0 9 15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1L1 7.5L8 14"/></svg>
        Atrás
      </button>
      <div class="nb-title" id="pform-title">Nuevo Paciente</div>
      <button class="nb-btn" style="font-weight:600" onclick="A.savePForm()">Guardar</button>
    </div>
  </div>
  <div class="sbody" id="pform-body"></div>
</div>

<!-- ===== SCREEN: PATIENT DETAIL ===== -->
<div id="s-pdetail" class="screen">
  <div class="navbar">
    <div class="nbc">
      <button class="nb-btn" onclick="A.back()">
        <svg width="9" height="15" viewBox="0 0 9 15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1L1 7.5L8 14"/></svg>
        Pacientes
      </button>
      <div class="nb-title" id="pdetail-title"></div>
      <button class="nb-btn" onclick="A.patientMenu()">
        <svg width="20" height="4" viewBox="0 0 20 4" fill="currentColor"><circle cx="2" cy="2" r="2"/><circle cx="10" cy="2" r="2"/><circle cx="18" cy="2" r="2"/></svg>
      </button>
    </div>
  </div>
  <div class="sbody" id="pdetail-body"></div>
  <button class="fab" onclick="A.openVisitForm(null)" title="Nueva consulta">+</button>
</div>

<!-- ===== SCREEN: VISIT FORM ===== -->
<div id="s-vform" class="screen">
  <div class="navbar">
    <div class="nbc">
      <button class="nb-btn" onclick="A.back()">
        <svg width="9" height="15" viewBox="0 0 9 15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1L1 7.5L8 14"/></svg>
        Atrás
      </button>
      <div class="nb-title" id="vform-title">Nueva Consulta</div>
      <button class="nb-btn" style="font-weight:600" onclick="A.saveVForm()">Guardar</button>
    </div>
  </div>
  <div class="sbody" id="vform-body"></div>
</div>

<!-- ===== SCREEN: VISIT DETAIL ===== -->
<div id="s-vdetail" class="screen">
  <div class="navbar">
    <div class="nbc">
      <button class="nb-btn" onclick="A.back()">
        <svg width="9" height="15" viewBox="0 0 9 15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1L1 7.5L8 14"/></svg>
        Historial
      </button>
      <div class="nb-title" id="vdetail-title">Consulta</div>
      <button class="nb-btn" style="font-size:15px" onclick="A.editVisit()">Editar</button>
    </div>
  </div>
  <div class="sbody" id="vdetail-body"></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="A.closeModal()">
  <div class="alert" onclick="event.stopPropagation()">
    <div class="alert-body">
      <div class="alert-t" id="modal-t"></div>
      <div class="alert-m" id="modal-m"></div>
    </div>
    <div class="alert-acts" id="modal-acts"></div>
  </div>
</div>

<!-- ACTION SHEET -->
<div class="sheet-bg" id="sheet-bg" onclick="A.closeSheet()"></div>
<div class="asheet" id="asheet">
  <div class="asheet-grp" id="asheet-grp"></div>
  <div class="asheet-grp">
    <button class="asheet-btn cancel" onclick="A.closeSheet()">Cancelar</button>
  </div>
</div>

<!-- RANGE SHEET -->
<div class="bsheet" id="range-sheet">
  <div class="bsheet-title">Rango personalizado</div>
  <div class="brow">
    <div class="bfield"><label>Desde</label><input type="date" id="rs-from" class="bottom-sheet-input" style="width:100%;background:rgba(118,118,128,.12);border:none;outline:none;border-radius:8px;padding:10px 12px;font-size:16px;color:var(--text);font-family:inherit"></div>
    <div class="bfield"><label>Hasta</label><input type="date" id="rs-to" class="bottom-sheet-input" style="width:100%;background:rgba(118,118,128,.12);border:none;outline:none;border-radius:8px;padding:10px 12px;font-size:16px;color:var(--text);font-family:inherit"></div>
  </div>
  <button class="btn btn-primary mt16" onclick="A.exportRange(document.getElementById('rs-from').value, document.getElementById('rs-to').value)">Exportar Excel</button>
</div>

<!-- MED SHEET -->
<div class="bsheet" id="med-sheet">
  <div class="bsheet-title">Agregar Medicamento</div>
  <div class="bfield"><label>Medicamento</label><input id="ms-name" placeholder="ej. Metformina" autocomplete="off"></div>
  <div class="brow">
    <div class="bfield"><label>Dosis</label><input id="ms-dose" placeholder="ej. 500mg"></div>
    <div class="bfield"><label>Frecuencia</label><input id="ms-freq" placeholder="ej. Cada 12h"></div>
  </div>
  <button class="btn btn-primary mt16" onclick="A.addMedFromSheet()">Agregar</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ── UTILS ──────────────────────────────────────────────────────────
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const today = () => new Date().toISOString().slice(0,10);
const MO = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

function fmtDate(s) {
  if (!s) return '';
  const [y,m,d] = s.split('-');
  return `${+d} ${MO[+m-1]} ${y}`;
}

function calcAge(dob) {
  if (!dob) return null;
  const b = new Date(dob + 'T12:00:00'), now = new Date();
  let a = now.getFullYear() - b.getFullYear();
  if (now.getMonth() < b.getMonth() || (now.getMonth() === b.getMonth() && now.getDate() < b.getDate())) a--;
  return a;
}

function calcBMI(w, h) {
  if (!w || !h) return null;
  return Math.round(w / Math.pow(h/100, 2) * 10) / 10;
}

function bmiInfo(bmi) {
  if (!bmi) return {txt:'—', cls:''};
  if (bmi < 18.5) return {txt:`${bmi} Bajo peso`, cls:'bmi-u'};
  if (bmi < 25)   return {txt:`${bmi} Normal`,    cls:'bmi-n'};
  if (bmi < 30)   return {txt:`${bmi} Sobrepeso`, cls:'bmi-s'};
  return {txt:`${bmi} Obesidad`, cls:'bmi-o'};
}

function initials(name) {
  return (name||'?').trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);
}

function avatarColor(name) {
  const cols = ['#007AFF','#34C759','#FF9500','#FF2D55','#AF52DE','#5AC8FA','#FF6B35','#00C7BE'];
  let h = 0;
  for (let i=0; i<(name||'').length; i++) h = (h*31 + name.charCodeAt(i)) | 0;
  return cols[Math.abs(h) % cols.length];
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── APP ────────────────────────────────────────────────────────────
const A = {
  patients: [],
  stack: ['patients'],
  pid: null,   // current patient id
  vid: null,   // current visit id
  ePt: null,   // patient being edited
  eVt: null,   // visit being edited
  tMeds: [],   // temp medications
  tDiags: [],  // temp diagnoses
  msTarget: 'pf', // med sheet target prefix
  _mActs: [],
  _sActs: [],

  // ── STORAGE ──
  load() {
    try { this.patients = JSON.parse(localStorage.getItem('bm-patients') || '[]'); }
    catch { this.patients = []; }
  },
  persist() {
    localStorage.setItem('bm-patients', JSON.stringify(this.patients));
  },

  // ── PATIENT CRUD ──
  pt(id) { return this.patients.find(p => p.id === id); },

  savePt(d) {
    if (d.id) {
      const i = this.patients.findIndex(p => p.id === d.id);
      if (i >= 0) this.patients[i] = {...this.patients[i], ...d};
    } else {
      d.id = uid(); d.createdAt = new Date().toISOString(); d.visits = [];
      this.patients.unshift(d);
    }
    this.persist();
  },

  delPt(id) {
    this.patients = this.patients.filter(p => p.id !== id);
    this.persist();
  },

  saveVt(pid, d) {
    const p = this.pt(pid);
    if (!p) return;
    if (!p.visits) p.visits = [];
    if (d.id) {
      const i = p.visits.findIndex(v => v.id === d.id);
      if (i >= 0) p.visits[i] = {...p.visits[i], ...d};
    } else {
      d.id = uid(); d.createdAt = new Date().toISOString();
      p.visits.unshift(d);
    }
    this.persist();
  },

  delVt(pid, vid) {
    const p = this.pt(pid);
    if (p) { p.visits = p.visits.filter(v => v.id !== vid); this.persist(); }
  },

  // ── NAVIGATION ──
  go(screen, params={}) {
    const cur = this.stack[this.stack.length-1];
    document.getElementById(`s-${cur}`)?.classList.add('prev');
    this.stack.push(screen);
    // Resetear el screen destino antes de animarlo (fix: pantalla a medias al reusar)
    const el = document.getElementById(`s-${screen}`);
    if (el) {
      el.classList.remove('active', 'prev');
      el.style.transform = 'translateX(100%)'; // forzar posición inicial
    }
    if (screen === 'pform')   { this.ePt = params.pt||null; this.renderPForm(); }
    if (screen === 'pdetail') { this.pid = params.pid; this.renderPDetail(); }
    if (screen === 'vform')   { this.eVt = params.vt||null; this.renderVForm(); }
    if (screen === 'vdetail') { this.vid = params.vid; this.renderVDetail(); }
    // doble rAF SEPARADO: 1er frame pinta el estado inicial, 2do frame dispara la transición
    requestAnimationFrame(() => {
      if (el) el.style.transform = ''; // Frame 1: quita inline → CSS da translateX(100%)
      requestAnimationFrame(() => {
        document.getElementById(`s-${screen}`)?.classList.add('active'); // Frame 2: transición 100%→0%
      });
    });
  },

  back() {
    if (this.stack.length <= 1) return;
    const cur = this.stack.pop();
    const el = document.getElementById(`s-${cur}`);
    if (el) {
      el.classList.remove('active');
      // Limpiar clases residuales tras la transición de salida
      setTimeout(() => { el.classList.remove('prev'); el.style.transform = ''; }, 400);
    }
    const prev = this.stack[this.stack.length-1];
    document.getElementById(`s-${prev}`)?.classList.remove('prev');
    if (prev === 'patients') this.renderList();
    if (prev === 'pdetail')  this.renderPDetail();
    if (prev === 'vdetail')  this.renderVDetail();
  },

    h += `<div class="sec-hdr">Signos Vitales</div><div class="card">`;
    if (v.weight) h += `<div class="row"><div class="row-main"><span class="row-title">Peso</span></div><span class="row-val">${v.weight} kg</span></div>`;
    if (v.bpSystolic&&v.bpDiastolic) h += `<div class="row"><div class="row-main"><span class="row-title">Presión Arterial</span></div><span class="row-val">${v.bpSystolic}/${v.bpDiastolic} mmHg</span></div>`;
    if (v.temperature) h += `<div class="row"><div class="row-main"><span class="row-title">Temperatura</span></div><span class="row-val">${v.temperature} °C</span></div>`;
    if (v.heartRate)   h += `<div class="row"><div class="row-main"><span class="row-title">Frec. Cardiaca</span></div><span class="row-val">${v.heartRate} lpm</span></div>`;
    if (!v.weight && !v.bpSystolic && !v.temperature && !v.heartRate)
      h += `<div style="padding:14px 16px;color:var(--text2);font-size:15px">Sin signos registrados</div>`;
    h += '</div>';

    if (v.lat && v.lng) {
      h += `<div class="sec-hdr">Ubicación</div>
      <div class="card">
        <a class="row" href="https://maps.google.com/?q=${v.lat},${v.lng}" target="_blank" style="text-decoration:none">
          <div class="row-main">
            <div class="row-title" style="color:var(--blue)">📍 ${v.lat}, ${v.lng}</div>
            <div class="row-sub">Toca para ver en Google Maps</div>
          </div>
        </a>
      </div>`;
    }

    if (v.diagnoses?.length) {
      h += `<div class="sec-hdr">Diagnósticos</div>
      <div class="card"><div class="tags" style="padding:12px 16px">${v.diagnoses.map(d=>`<div class="tag">${esc(d)}</div>`).join('')}</div></div>`;
    }

    if (v.medications?.length) {
      h += `<div class="sec-hdr">Medicamentos</div><div class="card">
        ${v.medications.map(m=>`<div class="med-row" style="padding:12px 16px">
          <div class="med-info"><div class="med-name">${esc(m.name)}</div>
          <div class="med-detail">${esc(m.dose)}${m.dose&&m.frequency?' · ':''}${esc(m.frequency)}</div></div>
        </div>`).join('')}
      </div>`;
    }

    if (v.notes) {
      h += `<div class="sec-hdr">Notas</div>
      <div class="card"><div style="padding:12px 16px;font-size:15px;line-height:1.6;white-space:pre-wrap">${esc(v.notes)}</div></div>`;
    }

    h += `<button class="btn btn-danger mt16" onclick="A.confirmDelVt('${p.id}','${v.id}')">Eliminar Consulta</button>
    <div style="height:40px"></div></div>`;

    document.getElementById('vdetail-body').innerHTML = h;
  },

  captureGPS() {
    const dot = document.getElementById('gps-dot');
    const lbl = document.getElementById('gps-label');
    if (!navigator.geolocation) {
      this.showAlert('No disponible','Tu dispositivo no soporta GPS.');
      return;
    }
    dot.className = 'gps-dot loading';
    lbl.textContent = 'Obteniendo ubicación...';
    navigator.geolocation.getCurrentPosition(
      pos => {
        this.tLat = Math.round(pos.coords.latitude  * 100000) / 100000;
        this.tLng = Math.round(pos.coords.longitude * 100000) / 100000;
        dot.className = 'gps-dot ok';
        lbl.textContent = `${this.tLat}, ${this.tLng}`;
      },
      err => {
        dot.className = 'gps-dot err';
        lbl.textContent = 'No se pudo obtener ubicación';
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  },

  exportKML(pids = null) {
    const pts = pids ? this.patients.filter(p => pids.includes(p.id)) : this.patients;
    const placemarks = [];
    pts.forEach(p => {
      (p.visits||[]).forEach(v => {
        if (!v.lat || !v.lng) return;
        const diag = (v.diagnoses||[]).join(', ') || 'Sin diagnóstico';
        const meds = (v.medications||[]).map(m=>`${m.name} ${m.dose}`).join(', ') || '';
        placemarks.push(`    <Placemark>
      <name>${esc(p.name)} — ${fmtDate(v.date)}</name>
      <description><![CDATA[
        <b>Paciente:</b> ${esc(p.name)}<br>
        <b>Fecha:</b> ${fmtDate(v.date)}<br>
        <b>Diagnóstico:</b> ${esc(diag)}<br>
        ${meds ? `<b>Medicamentos:</b> ${esc(meds)}<br>` : ''}
        ${v.notes ? `<b>Notas:</b> ${esc(v.notes)}<br>` : ''}
      ]]></description>
      <Point><coordinates>${v.lng},${v.lat},0</coordinates></Point>
    </Placemark>`);
      });
    });

    if (!placemarks.length) {
      this.showAlert('Sin ubicaciones','No hay visitas con coordenadas registradas. Captura la ubicación GPS al registrar cada consulta.');
      return;
    }

    const kml = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
  <Document>
    <name>Bitácora Médica — Visitas Domiciliarias</name>
    <Style id="pin">
      <IconStyle><Icon><href>http://maps.google.com/mapfiles/ms/icons/red-dot.png</href></Icon></IconStyle>
    </Style>
${placemarks.join('\n')}
  </Document>
</kml>`;

    const blob = new Blob([kml], { type: 'application/vnd.google-earth.kml+xml' });
    const fname = `visitas_${today()}.kml`;
    const file = new File([blob], fname, { type: blob.type });

    if (navigator.canShare && navigator.canShare({ files:[file] })) {
      navigator.share({ files:[file], title: fname }).catch(() => this._downloadBlob(blob, fname));
    } else {
      this._downloadBlob(blob, fname);
    }
  },

  _downloadBlob(blob, filename) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 2000);
  },

  editVisit() {
    const p = this.pt(this.pid);
    const v = p?.visits.find(v => v.id === this.vid);
    if (v) this.go('vform', {vt: v});
  },

  // ── MENUS ──
  globalMenu() {
    this._sActs = [
      { label:'Exportar todo a Excel', fn: () => this.exportAll() },
      { label:'Exportar por período', fn: () => this.periodMenu() },
      { label:'Exportar mapa KML (INEGI)', fn: () => this.exportKML() },
      { label:'Eliminar todos los pacientes', dest:true, fn: () => this.confirmDelAll() },
    ];
    this.renderSheet(this._sActs);
  },

  periodMenu() {
    const now = new Date();
    const fmt = d => d.toISOString().slice(0,10);
    const monday = new Date(now); monday.setDate(now.getDate() - ((now.getDay()+6)%7));
    const firstDay = new Date(now.getFullYear(), now.getMonth(), 1);

    this._sActs = [
      { label:'Hoy',              fn: () => this.exportRange(fmt(now), fmt(now)) },
      { label:'Esta semana',      fn: () => this.exportRange(fmt(monday), fmt(now)) },
      { label:'Este mes',         fn: () => this.exportRange(fmt(firstDay), fmt(now)) },
      { label:'Rango personalizado', fn: () => this.showRangeSheet() },
    ];
    this.renderSheet(this._sActs);
  },

  showRangeSheet() {
    const now = today();
    document.getElementById('rs-from').value = now;
    document.getElementById('rs-to').value = now;
    document.getElementById('range-sheet').classList.add('show');
    document.getElementById('sheet-bg').classList.add('show');
  },

  exportRange(from, to) {
    if (!from || !to) { this.showAlert('Fechas requeridas','Selecciona las fechas de inicio y fin.'); return; }
    if (!window.XLSX) { this.showAlert('Sin conexión','Necesitas internet la primera vez para exportar.'); return; }
    if (from > to) { this.showAlert('Rango inválido','La fecha de inicio debe ser antes que la fecha de fin.'); return; }

    // Recopilar todas las consultas del rango de todos los pacientes
    const rows = [];
    this.patients.forEach(p => {
      (p.visits||[]).forEach(v => {
        if (v.date >= from && v.date <= to) {
          rows.push([
            v.date, p.name,
            calcAge(p.dob)!=null ? calcAge(p.dob) : '',
            p.sex==='M'?'Masculino':p.sex==='F'?'Femenino':'',
            v.weight||'', v.bpSystolic||'', v.bpDiastolic||'',
            v.temperature||'', v.heartRate||'',
            (v.diagnoses||[]).join(', '),
            (v.medications||[]).map(m=>`${m.name} ${m.dose} ${m.frequency}`).join('; '),
            v.notes||'',
          ]);
        }
      });
    });

    // Ordenar por fecha
    rows.sort((a,b) => a[0].localeCompare(b[0]));

    if (!rows.length) {
      this.showAlert('Sin resultados',`No hay consultas registradas entre ${fmtDate(from)} y ${fmtDate(to)}.`);
      return;
    }

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
      ['Fecha','Paciente','Edad','Sexo','Peso kg','PA Sys','PA Dia','Temp °C','FC lpm','Diagnósticos','Medicamentos','Notas'],
      ...rows
    ]), 'Consultas');

    const fname = from === to
      ? `consultas_${from}.xlsx`
      : `consultas_${from}_al_${to}.xlsx`;

    // Cerrar range sheet si estaba abierto
    document.getElementById('range-sheet').classList.remove('show');
    document.getElementById('sheet-bg').classList.remove('show');

    this._shareOrDownload(wb, fname);
  },

  confirmDelAll() {
    if (!this.patients.length) { this.showAlert('Sin pacientes','No hay pacientes registrados.'); return; }
    this.showAlert(
      'Eliminar todos',
      `¿Eliminar los ${this.patients.length} paciente${this.patients.length!==1?'s':''} y todo su historial? Esta acción no se puede deshacer.`,
      [
        {label:'Cancelar', bold:true},
        {label:'Eliminar todo', dest:true, fn:() => {
          this.patients = [];
          this.persist();
          this.renderList();
        }}
      ]
    );
  },

  patientMenu() {
    this._sActs = [
      { label:'Editar Paciente', fn: () => { const p=this.pt(this.pid); this.go('pform',{pt:p}); } },
      { label:'Exportar a Excel', fn: () => this.exportPt(this.pid) },
      { label:'Exportar mapa KML (INEGI)', fn: () => this.exportKML([this.pid]) },
      { label:'Eliminar Paciente', dest:true, fn: () => this.confirmDelPt(this.pid) },
    ];
    this.renderSheet(this._sActs);
  },

  renderSheet(acts) {
    document.getElementById('asheet-grp').innerHTML = acts.map((a,i) =>
      `<button class="asheet-btn ${a.dest?'dest':''}" onclick="A.runSheet(${i})">${esc(a.label)}</button>`
    ).join('');
    document.getElementById('asheet').classList.add('show');
    document.getElementById('sheet-bg').classList.add('show');
  },

  runSheet(i) {
    const action = this._sActs[i];
    this.closeSheet();
    if (action?.fn) action.fn();
  },

  closeSheet() {
    ['asheet','med-sheet','range-sheet'].forEach(id => document.getElementById(id)?.classList.remove('show'));
    document.getElementById('sheet-bg').classList.remove('show');
  },

  // ── MODAL ──
  showAlert(t, m, acts=null) {
    document.getElementById('modal-t').textContent = t;
    document.getElementById('modal-m').textContent = m||'';
    this._mActs = acts || [{label:'OK'}];
    document.getElementById('modal-acts').innerHTML = this._mActs.map((a,i) =>
      `<button class="alert-btn ${a.dest?'dest':''} ${a.bold?'bold':''}" onclick="A.runModal(${i})">${esc(a.label)}</button>`
    ).join('');
    document.getElementById('modal-bg').classList.add('show');
  },

  runModal(i) {
    this.closeModal();
    this._mActs[i]?.fn?.();
  },

  closeModal() { document.getElementById('modal-bg').classList.remove('show'); },

  confirmDelPt(id) {
    const p = this.pt(id);
    this.showAlert('Eliminar Paciente', `¿Eliminar a "${p?.name}"? No se puede deshacer.`, [
      {label:'Cancelar', bold:true},
      {label:'Eliminar', dest:true, fn:() => {
        this.delPt(id);
        while (this.stack.length > 1) {
          const cur = this.stack.pop();
          const el = document.getElementById(`s-${cur}`);
          if (el) { el.classList.remove('active','prev'); el.style.transform=''; }
        }
        document.getElementById('s-patients')?.classList.remove('prev');
        this.renderList();
      }}
    ]);
  },

  confirmDelVt(pid, vid) {
    this.showAlert('Eliminar Consulta', '¿Eliminar esta consulta? No se puede deshacer.', [
      {label:'Cancelar', bold:true},
      {label:'Eliminar', dest:true, fn:() => {
        this.delVt(pid, vid);
        this.back();
        this.renderPDetail();
      }}
    ]);
  },

  // ── EXPORT ──
  _shareOrDownload(wb, filename) {
    const buf = XLSX.write(wb, { bookType:'xlsx', type:'array' });
    const blob = new Blob([buf], { type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const file = new File([blob], filename, { type: blob.type });

    if (navigator.canShare && navigator.canShare({ files:[file] })) {
      navigator.share({ files:[file], title: filename }).catch(() => this._download(blob, filename));
    } else {
      this._download(blob, filename);
    }
  },

  _download(blob, filename) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 2000);
  },

  exportPt(id) {
    const p = this.pt(id);
    if (!p || !window.XLSX) { this.showAlert('Sin conexión','Necesitas internet la primera vez para exportar.'); return; }
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
      ['Campo','Valor'],
      ['Nombre', p.name], ['Fecha nac.', p.dob], ['Edad', calcAge(p.dob)!=null?calcAge(p.dob)+' años':''],
      ['Sexo', p.sex==='M'?'Masculino':'Femenino'], ['Peso (kg)', p.weight], ['Talla (cm)', p.height],
      ['IMC', calcBMI(p.weight,p.height)], ['Diagnósticos', (p.diagnoses||[]).join(', ')],
      ['Medicamentos', (p.medications||[]).map(m=>`${m.name} ${m.dose} ${m.frequency}`).join('; ')],
      ['Notas', p.notes],
    ]), 'Paciente');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
      ['Fecha','Peso kg','PA Sys','PA Dia','Temp °C','FC lpm','Diagnósticos','Medicamentos','Notas'],
      ...(p.visits||[]).map(v => [
        v.date, v.weight||'', v.bpSystolic||'', v.bpDiastolic||'',
        v.temperature||'', v.heartRate||'',
        (v.diagnoses||[]).join(', '),
        (v.medications||[]).map(m=>`${m.name} ${m.dose} ${m.frequency}`).join('; '),
        v.notes||'',
      ])
    ]), 'Consultas');
    this._shareOrDownload(wb, `${p.name.replace(/\s+/g,'_')}_bitacora.xlsx`);
  },

  exportAll() {
    if (!window.XLSX) { this.showAlert('Sin conexión','Necesitas internet la primera vez para exportar.'); return; }
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
      ['Nombre','Fecha Nac.','Edad','Sexo','Peso','Talla','IMC','Diagnósticos','Consultas'],
      ...this.patients.map(p => [
        p.name, p.dob, calcAge(p.dob), p.sex==='M'?'Masculino':'Femenino',
        p.weight, p.height, calcBMI(p.weight,p.height),
        (p.diagnoses||[]).join(', '), (p.visits||[]).length,
      ])
    ]), 'Pacientes');
    this.patients.forEach(p => {
      if (!p.visits?.length) return;
      const name = p.name.slice(0,28).replace(/[\\\/\?\*\[\]:]/g,'');
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
        ['Fecha','Peso','PA Sys','PA Dia','Temp','FC','Diagnósticos','Medicamentos','Notas'],
        ...p.visits.map(v => [
          v.date, v.weight||'', v.bpSystolic||'', v.bpDiastolic||'',
          v.temperature||'', v.heartRate||'',
          (v.diagnoses||[]).join(', '),
          (v.medications||[]).map(m=>`${m.name} ${m.dose}`).join('; '),
          v.notes||'',
        ])
      ]), name);
    });
    this._shareOrDownload(wb, `bitacora_${today()}.xlsx`);
  },

  // ── CHARTS ──
  mkChart(visits, keys, opts = {}) {
    const ks = Array.isArray(keys) ? keys : [keys];
    const colors = opts.colors || ['#007AFF'];
    const unit = opts.unit || '';

    // Filtrar visitas con dato válido y ordenar por fecha
    const pts = visits
      .filter(v => ks.some(k => +v[k] > 0))
      .sort((a, b) => a.date.localeCompare(b.date));
    if (pts.length < 2) return '';

    const W = 300, H = 106, pL = 32, pR = 10, pT = 10, pB = 22;
    const plotW = W - pL - pR, plotH = H - pT - pB;

    const allVals = ks.flatMap(k => pts.map(v => +v[k] || 0).filter(x => x > 0));
    let minY = Math.min(...allVals), maxY = Math.max(...allVals);
    const span = maxY - minY;
    if (span === 0) { minY -= 2; maxY += 2; }
    else { minY = Math.max(0, minY - span * 0.15); maxY = maxY + span * 0.15; }

    const ts = pts.map(v => new Date(v.date + 'T12:00:00').getTime());
    const minT = Math.min(...ts), maxT = Math.max(...ts);

    const cx = t  => pL + (maxT === minT ? plotW / 2 : (t - minT) / (maxT - minT) * plotW);
    const cy = v  => pT + plotH - (v - minY) / (maxY - minY) * plotH;
    const fd = s  => { const [,m,d] = s.split('-'); return `${+d}/${+m}`; };

    // Gradients
    let defs = '<defs>';
    ks.forEach((k, i) => {
      defs += `<linearGradient id="cg_${k}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${colors[i]}" stop-opacity=".22"/>
        <stop offset="100%" stop-color="${colors[i]}" stop-opacity="0"/>
      </linearGradient>`;
    });
    defs += '</defs>';

    // Grid horizontal (3 líneas)
    let grid = '';
    [minY, (minY + maxY) / 2, maxY].forEach(v => {
      const y = cy(v);
      grid += `<line x1="${pL}" y1="${y}" x2="${W - pR}" y2="${y}" stroke="rgba(60,60,67,.1)" stroke-width=".5"/>`;
      grid += `<text x="${pL - 3}" y="${y + 3.5}" text-anchor="end" font-size="8" fill="#8E8E93">${Math.round(v)}</text>`;
    });

    // Líneas y puntos por cada key
    let lines = '';
    ks.forEach((k, i) => {
      const vp = pts.filter(v => +v[k] > 0);
      if (vp.length < 2) return;
      const coords = vp.map(v => ({ x: cx(new Date(v.date + 'T12:00:00').getTime()), y: cy(+v[k]) }));
      const poly = coords.map(c => `${c.x},${c.y}`).join(' ');
      const area = `M${coords[0].x},${pT + plotH} ${coords.map(c => `L${c.x},${c.y}`).join(' ')} L${coords[coords.length-1].x},${pT + plotH}Z`;
      lines += `<path d="${area}" fill="url(#cg_${k})"/>`;
      lines += `<polyline points="${poly}" fill="none" stroke="${colors[i]}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
      coords.forEach(c => {
        lines += `<circle cx="${c.x}" cy="${c.y}" r="3" fill="${colors[i]}" stroke="#fff" stroke-width="1.5"/>`;
      });
      // Etiqueta del último valor
      const last = coords[coords.length - 1];
      const lastV = vp[vp.length - 1][k];
      const lx = Math.min(last.x + 5, W - pR - 22);
      lines += `<text x="${lx}" y="${last.y + 4}" font-size="9" fill="${colors[i]}" font-weight="600">${lastV}${unit}</text>`;
    });

    // Etiquetas X (primera y última fecha)
    const xL = `<text x="${pL}" y="${H - 5}" font-size="8" fill="#8E8E93">${fd(pts[0].date)}</text>`
             + `<text x="${W - pR}" y="${H - 5}" text-anchor="end" font-size="8" fill="#8E8E93">${fd(pts[pts.length-1].date)}</text>`;

    return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block">${defs}${grid}${lines}${xL}</svg>`;
  },

  renderCharts(p) {
    if (!p.visits || p.visits.length < 2) return '';
    const sv = [...p.visits].sort((a, b) => a.date.localeCompare(b.date));
    let h = '';

    // Peso
    const wPts = sv.filter(v => +v.weight > 0);
    if (wPts.length >= 2) {
      h += `<div class="sec-hdr">Tendencia — Peso</div>
      <div class="card"><div class="chart-wrap">
        ${this.mkChart(wPts, 'weight', { colors: ['#007AFF'], unit: 'kg' })}
      </div></div>`;
    }

    // Presión arterial
    const bpPts = sv.filter(v => +v.bpSystolic > 0 && +v.bpDiastolic > 0);
    if (bpPts.length >= 2) {
      h += `<div class="sec-hdr">Tendencia — Presión Arterial</div>
      <div class="card"><div class="chart-wrap">
        ${this.mkChart(bpPts, ['bpSystolic','bpDiastolic'], { colors: ['#FF3B30','#FF9500'] })}
        <div class="chart-legend">
          <span><svg width="10" height="10"><circle cx="5" cy="5" r="4" fill="#FF3B30"/></svg>Sistólica</span>
          <span><svg width="10" height="10"><circle cx="5" cy="5" r="4" fill="#FF9500"/></svg>Diastólica</span>
        </div>
      </div></div>`;
    }

    // Frecuencia cardiaca
    const hrPts = sv.filter(v => +v.heartRate > 0);
    if (hrPts.length >= 2) {
      h += `<div class="sec-hdr">Tendencia — Frec. Cardiaca</div>
      <div class="card"><div class="chart-wrap">
        ${this.mkChart(hrPts, 'heartRate', { colors: ['#FF2D55'], unit: 'lpm' })}
      </div></div>`;
    }

    // Temperatura
    const tPts = sv.filter(v => +v.temperature > 0);
    if (tPts.length >= 2) {
      h += `<div class="sec-hdr">Tendencia — Temperatura</div>
      <div class="card"><div class="chart-wrap">
        ${this.mkChart(tPts, 'temperature', { colors: ['#FF9500'], unit: '°C' })}
      </div></div>`;
    }

    return h;
  },

  // ── INIT ──
  init() {
    this.load();
    this.renderList();
    if ('serviceWorker' in navigator)
      navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
};

document.addEventListener('DOMContentLoaded', () => A.init());
</script>
</body>
</html>
